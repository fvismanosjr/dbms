<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SQL DBMS — GUI</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        header {
            background: #1e293b;
            padding: 12px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #334155;
        }
        header h1 {
            font-size: 18px;
            font-weight: 600;
            color: #38bdf8;
            letter-spacing: 0.5px;
        }
        .tx-status {
            font-size: 12px;
            padding: 4px 12px;
            border-radius: 12px;
            font-weight: 500;
        }
        .tx-status.active {
            background: #166534;
            color: #4ade80;
        }
        .tx-status.idle {
            background: #334155;
            color: #94a3b8;
        }
        .container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }
        .sidebar {
            width: 280px;
            background: #1e293b;
            border-right: 1px solid #334155;
            overflow-y: auto;
            padding: 16px;
        }
        .sidebar h2 {
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #94a3b8;
            margin-bottom: 12px;
        }
        .table-item {
            margin-bottom: 8px;
            border-radius: 6px;
            overflow: hidden;
        }
        .table-header {
            background: #334155;
            padding: 8px 12px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
            font-weight: 500;
        }
        .table-header:hover { background: #475569; }
        .table-header .chevron {
            transition: transform 0.2s;
            font-size: 12px;
        }
        .table-header.expanded .chevron {
            transform: rotate(90deg);
        }
        .table-details {
            display: none;
            background: #0f172a;
            padding: 8px 12px;
        }
        .table-details.visible {
            display: block;
        }
        .detail-row {
            font-size: 12px;
            padding: 3px 0;
            display: flex;
            justify-content: space-between;
            color: #cbd5e1;
        }
        .detail-label { color: #64748b; }
        .pk-badge {
            background: #b45309;
            color: #fef3c7;
            font-size: 9px;
            padding: 1px 5px;
            border-radius: 3px;
            margin-left: 4px;
        }
        .fk-badge {
            background: #1e40af;
            color: #dbeafe;
            font-size: 9px;
            padding: 1px 5px;
            border-radius: 3px;
            margin-left: 4px;
        }
        .idx-badge {
            background: #065f46;
            color: #d1fae5;
            font-size: 9px;
            padding: 1px 5px;
            border-radius: 3px;
            margin-left: 4px;
        }
        .nn-badge {
            color: #f87171;
            font-size: 9px;
            margin-left: 4px;
        }
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .editor-area {
            padding: 20px;
            border-bottom: 1px solid #334155;
        }
        .sql-input {
            width: 100%;
            height: 120px;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 12px;
            color: #e2e8f0;
            font-family: 'JetBrains Mono', 'Fira Code', 'Consolas', monospace;
            font-size: 14px;
            resize: vertical;
            outline: none;
        }
        .sql-input:focus {
            border-color: #38bdf8;
            box-shadow: 0 0 0 2px rgba(56, 189, 248, 0.2);
        }
        .toolbar {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }
        .btn {
            padding: 8px 18px;
            border: none;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.15s;
        }
        .btn-primary {
            background: #0ea5e9;
            color: white;
        }
        .btn-primary:hover { background: #0284c7; }
        .btn-secondary {
            background: #334155;
            color: #e2e8f0;
        }
        .btn-secondary:hover { background: #475569; }
        .results-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }
        .result-block {
            margin-bottom: 20px;
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 8px;
            overflow: hidden;
        }
        .result-header {
            padding: 10px 16px;
            font-size: 12px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .result-header.select { background: #0c4a6e; color: #7dd3fc; }
        .result-header.dml { background: #14532d; color: #86efac; }
        .result-header.ddl { background: #581c87; color: #d8b4fe; }
        .result-header.transaction { background: #713f12; color: #fde047; }
        .result-header.error { background: #7f1d1d; color: #fca5a5; }
        .result-header.schema { background: #1e3a5f; color: #93c5fd; }
        .result-header.tables { background: #3f6212; color: #bef264; }
        .result-body {
            padding: 16px;
            font-family: 'JetBrains Mono', 'Fira Code', 'Consolas', monospace;
            font-size: 13px;
            line-height: 1.6;
            white-space: pre-wrap;
            overflow-x: auto;
        }
        .result-body table {
            width: 100%;
            border-collapse: collapse;
            font-family: 'JetBrains Mono', 'Fira Code', 'Consolas', monospace;
            font-size: 13px;
        }
        .result-body th {
            background: #334155;
            padding: 8px 12px;
            text-align: left;
            font-weight: 600;
            color: #e2e8f0;
            border-bottom: 2px solid #475569;
        }
        .result-body td {
            padding: 6px 12px;
            border-bottom: 1px solid #334155;
            color: #cbd5e1;
        }
        .result-body tr:hover td {
            background: #1e293b;
        }
        .error-banner {
            background: #7f1d1d;
            color: #fca5a5;
            padding: 12px 16px;
            border-radius: 6px;
            margin-bottom: 16px;
            font-size: 13px;
            border-left: 4px solid #ef4444;
        }
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #64748b;
        }
        .empty-state svg {
            width: 48px;
            height: 48px;
            margin-bottom: 16px;
            opacity: 0.5;
        }
        .hint {
            font-size: 11px;
            color: #64748b;
            margin-top: 6px;
        }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }
    </style>
</head>
<body>
    <header>
        <h1>⚡ SQL DBMS</h1>
        <div class="tx-status idle" id="txStatus">No Transaction</div>
    </header>
    
    <div class="container">
        <aside class="sidebar" id="sidebar">
            <h2>Schema Browser</h2>
            <div id="schemaContent">
                <div class="empty-state">Loading schema...</div>
            </div>
        </aside>
        
        <main class="main">
            <div class="editor-area">
                <textarea class="sql-input" id="sqlInput" placeholder="-- Type your SQL here...
-- Example:
select * from account;
insert into account values(3, 'charlie');
"></textarea>
                <div class="toolbar">
                    <button class="btn btn-primary" id="runBtn" onclick="runQuery()">
                        ▶ Run Query
                    </button>
                    <button class="btn btn-secondary" onclick="clearResults()">
                        Clear Results
                    </button>
                    <button class="btn btn-secondary" onclick="loadExample()">
                        Load Example
                    </button>
                </div>
                <div class="hint">Tip: Use semicolons to separate multiple statements. Press Ctrl+Enter to run.</div>
            </div>
            
            <div class="results-area" id="resultsArea">
                <div class="empty-state">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                        <polyline points="14 2 14 8 20 8"></polyline>
                        <line x1="16" y1="13" x2="8" y2="13"></line>
                        <line x1="16" y1="17" x2="8" y2="17"></line>
                    </svg>
                    <p>Run a query to see results</p>
                </div>
            </div>
        </main>
    </div>

    <script>
        const sqlInput = document.getElementById('sqlInput');
        const resultsArea = document.getElementById('resultsArea');
        const txStatus = document.getElementById('txStatus');
        const schemaContent = document.getElementById('schemaContent');
        
        sqlInput.addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.key === 'Enter') {
                runQuery();
            }
        });
        
        async function loadSchema() {
            try {
                const res = await fetch('/api/schema');
                const data = await res.json();
                renderSchema(data.tables);
                updateTxStatus(data.in_transaction);
            } catch (err) {
                schemaContent.innerHTML = '<div class="empty-state">Failed to load schema</div>';
            }
        }
        
        function renderSchema(tables) {
            if (Object.keys(tables).length === 0) {
                schemaContent.innerHTML = '<div class="empty-state">No tables yet</div>';
                return;
            }
            let html = '';
            for (const [tableName, info] of Object.entries(tables)) {
                html += `
                    <div class="table-item">
                        <div class="table-header" onclick="toggleTable(this)">
                            <span>📋 ${tableName}</span>
                            <span class="chevron">▶</span>
                        </div>
                        <div class="table-details">
                            ${Object.entries(info.columns).map(([col, type]) => {
                                let badges = '';
                                if (info.primary_key.includes(col)) badges += '<span class="pk-badge">PK</span>';
                                if (info.not_null.includes(col)) badges += '<span class="nn-badge">NOT NULL</span>';
                                if (info.foreign_keys[col]) badges += '<span class="fk-badge">FK</span>';
                                if (info.indexes.includes(col)) badges += '<span class="idx-badge">IDX</span>';
                                return `<div class="detail-row">
                                    <span>${col} ${badges}</span>
                                    <span class="detail-label">${type}</span>
                                </div>`;
                            }).join('')}
                        </div>
                    </div>
                `;
            }
            schemaContent.innerHTML = html;
        }
        
        function toggleTable(header) {
            header.classList.toggle('expanded');
            const details = header.nextElementSibling;
            details.classList.toggle('visible');
        }
        
        function updateTxStatus(active) {
            if (active) {
                txStatus.textContent = '● Transaction Active';
                txStatus.className = 'tx-status active';
            } else {
                txStatus.textContent = 'No Transaction';
                txStatus.className = 'tx-status idle';
            }
        }
        
        async function runQuery() {
            const sql = sqlInput.value.trim();
            if (!sql) return;
            
            const runBtn = document.getElementById('runBtn');
            runBtn.textContent = '⏳ Running...';
            runBtn.disabled = true;
            
            try {
                const res = await fetch('/api/query', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ sql })
                });
                const data = await res.json();
                renderResults(data.results);
                loadSchema(); // Refresh schema in case of DDL
            } catch (err) {
                resultsArea.innerHTML = `<div class="error-banner">Network error: ${err.message}</div>`;
            } finally {
                runBtn.textContent = '▶ Run Query';
                runBtn.disabled = false;
            }
        }
        
        function renderResults(results) {
            if (!results || results.length === 0) {
                resultsArea.innerHTML = '<div class="empty-state">No results</div>';
                return;
            }
            
            let html = '';
            for (const r of results) {
                if (!r.success) {
                    html += `<div class="error-banner">${escapeHtml(r.error)}</div>`;
                    continue;
                }
                
                const typeClass = r.type || 'dml';
                let bodyContent = '';
                
                if (r.type === 'select' && r.headers && r.rows) {
                    // Extract index scan note (any lines before the ASCII table)
                    let prefixNote = '';
                    if (r.raw) {
                        const lines = r.raw.split('\n');
                        const tableStart = lines.findIndex(l => l.startsWith('+-'));
                        if (tableStart > 0) {
                            prefixNote = lines.slice(0, tableStart).join('\n');
                        }
                    }
                    bodyContent = `
                        ${prefixNote ? `<pre class="result-note">${escapeHtml(prefixNote)}</pre>` : ''}
                        <table>
                            <thead><tr>${r.headers.map(h => `<th>${escapeHtml(h)}</th>`).join('')}</tr></thead>
                            <tbody>
                                ${r.rows.map(row => `<tr>${row.map(c => `<td>${escapeHtml(c)}</td>`).join('')}</tr>`).join('')}
                            </tbody>
                        </table>
                    `;
                } else {
                    bodyContent = escapeHtml(r.message || r.raw || JSON.stringify(r));
                }
                
                html += `
                    <div class="result-block">
                        <div class="result-header ${typeClass}">
                            ${typeIcon(r.type)} ${r.type.toUpperCase()}
                        </div>
                        <div class="result-body">${bodyContent}</div>
                    </div>
                `;
            }
            resultsArea.innerHTML = html;
        }
        
        function typeIcon(type) {
            const icons = {
                select: '🔍',
                dml: '✏️',
                ddl: '🏗️',
                transaction: '🔒',
                error: '❌',
                schema: '📋',
                tables: '📑'
            };
            return icons[type] || '▶️';
        }
        
        function clearResults() {
            resultsArea.innerHTML = `
                <div class="empty-state">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                        <polyline points="14 2 14 8 20 8"></polyline>
                        <line x1="16" y1="13" x2="8" y2="13"></line>
                        <line x1="16" y1="17" x2="8" y2="17"></line>
                    </svg>
                    <p>Run a query to see results</p>
                </div>
            `;
        }
        
        function loadExample() {
            sqlInput.value = `create table students (
    id int not null,
    name char(20),
    gpa int,
    primary key(id)
);

insert into students values(1, 'Alice', 90);
insert into students values(2, 'Bob', 85);
insert into students values(3, 'Charlie', 95);

create index students_idx on students(id);

select * from students where id = 2;

begin;
update students set gpa = 100 where id = 1;
select * from students;
rollback;

select * from students;`;
        }
        
        function escapeHtml(text) {
            if (text === null || text === undefined) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // Load schema on page load
        loadSchema();
    </script>
</body>
</html>
