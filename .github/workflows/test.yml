name: SQL-DBMS Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  # ─────────────────────────────────────────────
  # Lint & Type Check (fast, runs first)
  # ─────────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8
      - name: Lint with flake8
        run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics || true

  # ─────────────────────────────────────────────
  # Feature Tests (parallel matrix)
  # ─────────────────────────────────────────────
  feature-test:
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        test:
          - test_update
          - test_index
          - test_transaction
          - test_integration
    name: ${{ matrix.test }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run ${{ matrix.test }}
        run: |
          python run_tests.py --test ${{ matrix.test }} --verbose
      - name: Print diagnostics on failure
        if: failure()
        run: |
          echo "=== EXPECTED OUTPUT ==="
          cat test/${{ matrix.test }}_expected.txt || true
          echo ""
          echo "=== ACTUAL OUTPUT ==="
          cat test/${{ matrix.test }}_actual.txt || true
          echo ""
          echo "=== FIRST 20 LINES DIFF ==="
          head -20 test/${{ matrix.test }}_expected.txt > /tmp/exp.txt || true
          head -20 test/${{ matrix.test }}_actual.txt > /tmp/act.txt || true
          diff -u /tmp/exp.txt /tmp/act.txt || true

  # ─────────────────────────────────────────────
  # GUI Build Check
  # ─────────────────────────────────────────────
  gui-check:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Verify GUI app imports
        run: python -c "from app import app; print('Flask app imports OK')"
      - name: Verify templates exist
        run: |
          test -f templates/index.html && echo "Template exists"

  # ─────────────────────────────────────────────
  # Full Test Suite (sequential, for coverage)
  # ─────────────────────────────────────────────
  full-suite:
    runs-on: ubuntu-latest
    needs: [lint, feature-test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run full test suite
        run: python run_tests.py --verbose
      - name: Upload test artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-outputs
          path: test/*.txt
